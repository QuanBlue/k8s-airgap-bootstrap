---
# Kubernetes Installation and Cluster Bootstrapping

- name: Bootstrap Kubernetes Cluster
  hosts: all
  become: true
  module_defaults:
    ansible.builtin.gather_facts:
      gather_timeout: 30
  roles:
    - kubernetes
    - k9s

- name: Deploy Cluster Addons (CNI, etc.)
  hosts: masters[0]
  become: true
  module_defaults:
    ansible.builtin.gather_facts:
      gather_timeout: 30
  tags: ['addons']
  roles:
    - calico
    - metrics-server

# Runs after every master has joined and addons are deployed. Patches the
# apiserver static pod on each master to disable anonymous-auth.
- name: Post-init API server hardening
  hosts: masters
  become: true
  serial: 1   # patch one master at a time so the cluster stays available
  module_defaults:
    ansible.builtin.gather_facts:
      gather_timeout: 30
  tags: ['hardening']
  roles:
    - kubernetes-hardening

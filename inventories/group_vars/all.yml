---
cluster_name: "dms4-cluster1"
project_name: "dms4-cluster1"
project_short_name: "DMS4"
environment_name: "Prod"
app_user: "app_vietteldms"
kubernetes_version: "1.36.0"

# Networking
network:
  pod_cidr: "10.244.0.0/16"
  service_cidr: "10.96.0.0/12"

# Container Runtime
container_runtime: containerd
containerd_config:
  root_dir: "/u01/app/lib/containerd"

# Kubelet
kubelet:
  pod_logs_dir: "/u01/app/log/containerd"
  volume_stats_agg_period: "0s"
  container_log_max_size: "50Mi"
  container_log_max_files: 90
  image_gc_high_threshold_percent: 65
  image_gc_low_threshold_percent: 60

# High Availability Settings
master_ha:
  enabled: true
  vip_address: "10.0.6.99"
  vip_interface: "eth0"
  vip_port: 8443

worker_ha:
  enabled: true
  vip_address: "10.0.6.23"
  vip_interface: "eth0"
  http_port: 80
  https_port: 443
  backend_http_port: 30080
  backend_https_port: 30443

# Calico CNI
calico_networking_backend: vxlan
calico_ip_autodetection_method: "interface=eth0"

# Offline/Airgap specific
airgap:
  enabled: true
  artifacts_dir: "{{ playbook_dir | dirname }}/artifacts"
  offline_images_dir: "/u01/app/lib/k8s-offline-images"

# Kubernetes API Server audit logging
kubernetes_audit:
  enabled: true
  log_dir: "/u01/app/log/kubernetes/audit"
  policy_file: "/etc/kubernetes/audit/policy.yaml"
  max_age: 90        # days
  max_backup: 20     # rotated files
  max_size: 100      # MB per file

# Backup: etcd snapshot (masters) + k8s config (all nodes), cron lúc 23:55
backup:
  enabled: true
  scripts_dir: "/u01/app/scripts"
  dest_root: "/u01/app/backup"
  retention_days: 90
  schedule:
    minute: 55
    hour: 23

# Host firewall (iptables) — bảo vệ port control-plane/etcd/kubelet
firewall:
  enabled: true
  nodeport_open: true
  admin_cidrs: []

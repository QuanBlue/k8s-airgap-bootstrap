---
- name: Ensure k9s is only configured on master nodes
  meta: end_host
  when: "'masters' not in group_names"

- name: Ensure offline binaries directory exists for k9s
  file:
    path: /tmp/k8s-bin
    state: directory
  when: airgap.enabled | bool

- name: Copy k9s binary from airgap bundle
  copy:
    src: "{{ airgap.artifacts_dir }}/bin/k9s"
    dest: /usr/local/bin/k9s
    mode: '0755'
  when: airgap.enabled | bool

- name: Ensure root kubeconfig directory exists
  file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Ensure root kubeconfig is present
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    owner: root
    group: root
    mode: '0600'

- name: Ensure app user kubeconfig directory exists
  file:
    path: "/home/{{ app_user }}/.kube"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0700'

- name: Ensure app user kubeconfig is present
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ app_user }}/.kube/config"
    remote_src: yes
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'

- name: Ensure app user k9s config directory exists
  file:
    path: "/home/{{ app_user }}/.config/k9s"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Ensure root k9s config directory exists
  file:
    path: /root/.config/k9s
    state: directory
    owner: root
    group: root
    mode: '0755'

---
- name: Install HAProxy from offline DEB package
  shell: DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/k8s-packages/haproxy*.deb
  when: airgap.enabled | bool
  register: haproxy_install
  failed_when:
    - haproxy_install.rc != 0
    - "'already installed' not in haproxy_install.stderr"
    - "'is already installed' not in haproxy_install.stdout"

- name: Ensure HAProxy config directory exists
  file:
    path: /etc/haproxy
    state: directory
    mode: '0755'

- name: Configure HAProxy
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: Enable and start HAProxy
  systemd:
    name: haproxy
    state: started
    enabled: yes

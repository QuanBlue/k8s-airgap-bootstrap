---
- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Disable swap permanently in fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Ensure kernel modules are loaded on boot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Configure sysctl parameters for Kubernetes
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }

- name: Set hostname from inventory
  hostname:
    name: "{{ inventory_hostname }}"

- name: Configure /etc/hosts with cluster nodes
  blockinfile:
    path: /etc/hosts
    block: |
      {% for host in groups['k8s_cluster'] %}
      {{ hostvars[host]['ansible_host'] }} {{ host }}
      {% endfor %}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - K8S CLUSTER"

- name: Rename 'app' user to configured app_user (if needed)
  shell: |
    set -e
    if [ "{{ app_user }}" = "app" ]; then
      echo "SKIP: app_user is already 'app'"
      exit 0
    fi
    if ! getent passwd app > /dev/null 2>&1; then
      echo "SKIP: user 'app' does not exist"
      exit 0
    fi
    if getent passwd {{ app_user }} > /dev/null 2>&1; then
      echo "SKIP: target user '{{ app_user }}' already exists"
      exit 0
    fi
    usermod -l {{ app_user }} app
    groupmod -n {{ app_user }} app
    usermod -d /home/{{ app_user }} -m {{ app_user }}
    echo "RENAMED: app -> {{ app_user }}"
  register: rename_result
  changed_when: "'RENAMED:' in rename_result.stdout"

- name: Ensure application user exists
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
    state: present


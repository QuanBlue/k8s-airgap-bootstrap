---
- name: Verify airgap artifacts directory exists on control node
  stat:
    path: "{{ airgap.artifacts_dir }}"
  register: airgap_artifacts_dir_stat
  delegate_to: localhost
  become: false

- name: Fail when airgap artifacts directory is missing on control node
  fail:
    msg: >-
      Airgap artifacts directory {{ airgap.artifacts_dir }} was not found on the control node.
      Run ./scripts/download-artifacts.sh and verify you are executing ansible-playbook from the repository root.
  when: not airgap_artifacts_dir_stat.stat.exists

- name: Ensure offline packages directory exists
  file:
    path: /tmp/k8s-packages
    state: directory

- name: Copy offline packages to node
  copy:
    src: "{{ airgap.artifacts_dir }}/packages/"
    dest: /tmp/k8s-packages/
  when: airgap.enabled | bool

- name: Resolve containerd archive on control node
  set_fact:
    containerd_archive_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/containerd-*-linux-amd64.tar.gz', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Fail when containerd airgap archive is missing
  fail:
    msg: >-
      Containerd archive was not found on the control node for {{ inventory_hostname }}.
      Expected a file like containerd-*-linux-amd64.tar.gz in {{ airgap.artifacts_dir }}/bin.
      Re-run ./scripts/download-artifacts.sh and verify the artifacts directory.
  when:
    - airgap.enabled | bool
    - containerd_archive_src | length == 0

- name: Resolve crictl archive on control node
  set_fact:
    crictl_archive_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/crictl-*-linux-amd64.tar.gz', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Resolve runc binary on control node
  set_fact:
    runc_binary_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/runc.amd64', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Install containerd from binary archive
  unarchive:
    src: "{{ containerd_archive_src }}"
    dest: /usr/local
  when:
    - airgap.enabled | bool
    - containerd_archive_src | length > 0

- name: Ensure /usr/local/bin exists
  file:
    path: /usr/local/bin
    state: directory
    mode: '0755'

- name: Install runc binary
  copy:
    src: "{{ runc_binary_src }}"
    dest: /usr/local/sbin/runc
    mode: '0755'
  when:
    - airgap.enabled | bool
    - runc_binary_src | length > 0

- name: Install crictl from binary archive
  unarchive:
    src: "{{ crictl_archive_src }}"
    dest: /usr/local/bin
  when:
    - airgap.enabled | bool
    - crictl_archive_src | length > 0

- name: Check for installed containerd binary
  stat:
    path: /usr/local/bin/containerd
  register: local_containerd_binary

- name: Fail when containerd binary is unavailable after installation
  fail:
    msg: >-
      /usr/local/bin/containerd is still missing on {{ inventory_hostname }}.
      Verify the containerd archive exists in {{ airgap.artifacts_dir }}/bin.
  when: not local_containerd_binary.stat.exists

- name: Install containerd systemd unit
  copy:
    dest: /etc/systemd/system/containerd.service
    mode: '0644'
    content: |
      [Unit]
      Description=containerd container runtime
      Documentation=https://containerd.io
      After=network.target local-fs.target

      [Service]
      ExecStart=/usr/local/bin/containerd
      Type=notify
      Delegate=yes
      KillMode=process
      Restart=always
      RestartSec=5
      LimitNPROC=infinity
      LimitCORE=infinity
      LimitNOFILE=infinity
      TasksMax=infinity
      OOMScoreAdjust=-999

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd after installing containerd unit
  systemd:
    daemon_reload: yes

- name: Ensure containerd config directory exists
  file:
    path: /etc/containerd
    state: directory

- name: Ensure containerd root directory exists
  file:
    path: "{{ containerd_config.root_dir }}"
    state: directory
    mode: '0755'

- name: Generate default containerd config
  command: /usr/local/bin/containerd config default
  register: containerd_config_default
  changed_when: false

- name: Write default containerd config
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_config_default.stdout }}"

- name: Configure containerd to use SystemdCgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

- name: Configure containerd root directory
  replace:
    path: /etc/containerd/config.toml
    regexp: '^root = .*$'
    replace: 'root = "{{ containerd_config.root_dir }}"'
  notify: restart containerd

- name: Enable and start containerd
  systemd:
    name: containerd
    state: started
    enabled: yes

- name: Copy offline images to node
  copy:
    src: "{{ airgap.artifacts_dir }}/images/"
    dest: "{{ airgap.offline_images_dir }}/"
  when: airgap.enabled | bool

- name: Copy image load script
  copy:
    src: "{{ playbook_dir | dirname }}/scripts/helpers/load-images.sh"
    dest: "/tmp/load-images.sh"
    mode: '0755'
  when: airgap.enabled | bool

- name: Load offline container images into containerd
  command: "/tmp/load-images.sh {{ airgap.offline_images_dir }}"
  when: airgap.enabled | bool
  register: image_load
  changed_when: "'Finished loading images' in image_load.stdout"

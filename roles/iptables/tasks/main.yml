---
# Cài host firewall: bảo vệ port control-plane/etcd/kubelet, giữ SSH + HAProxy mở.
# Chạy sau khi cluster + Calico đã lên (xem playbooks/firewall.yml).

- name: Preseed iptables-persistent (no interactive prompt)
  ansible.builtin.debconf:
    name: iptables-persistent
    question: "{{ item }}"
    vtype: boolean
    value: "true"
  loop:
    - iptables-persistent/autosave_v4
    - iptables-persistent/autosave_v6
  when: airgap.enabled | default(true) | bool

- name: Stage offline DEB packages into apt cache
  ansible.builtin.shell: cp /tmp/k8s-packages/*.deb /var/cache/apt/archives/ 2>/dev/null || true
  changed_when: false
  when: airgap.enabled | default(true) | bool

- name: Install iptables-persistent via apt (resolves from local cache)
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: no
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Fail if node_role is not supported
  ansible.builtin.fail:
    msg: "Unsupported node_role '{{ node_role | default('<undefined>') }}'. Expected 'master' or 'worker'."
  when: node_role | default('') not in ['master', 'worker']

- name: Check rendered firewall script exists in repo
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../scripts/servers/iptables/k8s-{{ node_role }}-iptables-rules.sh"
  delegate_to: localhost
  become: false
  register: firewall_script_src

- name: Fail if rendered firewall script is missing
  ansible.builtin.fail:
    msg: >-
      Missing firewall source-of-truth script:
      {{ playbook_dir }}/../scripts/servers/iptables/k8s-{{ node_role }}-iptables-rules.sh.
      Restore or recreate the script in scripts/servers/iptables/.
      Re-run ./scripts/bootstrap.sh only to sync the bootstrap-managed value block.
  when: not firewall_script_src.stat.exists

- name: Ensure firewall scripts directory exists
  ansible.builtin.file:
    path: "{{ firewall.scripts_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install rendered server-side iptables script for this node role
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/servers/iptables/k8s-{{ node_role }}-iptables-rules.sh"
    dest: "{{ firewall.scripts_dir }}/k8s-{{ node_role }}-iptables-rules.sh"
    owner: root
    group: root
    mode: "0750"

- name: Capture iptables state before apply
  ansible.builtin.command: iptables-save
  register: ipt_before
  changed_when: false

- name: Apply host firewall rules
  ansible.builtin.command: "{{ firewall.scripts_dir }}/k8s-{{ node_role }}-iptables-rules.sh"
  changed_when: false

- name: Capture iptables state after apply
  ansible.builtin.command: iptables-save
  register: ipt_after
  changed_when: ipt_after.stdout != ipt_before.stdout

- name: Persist rules across reboot (netfilter-persistent save)
  ansible.builtin.command: netfilter-persistent save
  when: ipt_after.stdout != ipt_before.stdout

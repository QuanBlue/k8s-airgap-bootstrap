apiVersion: audit.k8s.io/v1
kind: Policy
omitStages:
  - "RequestReceived"
rules:
  # Drop noisy non-resource URLs
  - level: None
    nonResourceURLs:
      - "/healthz*"
      - "/livez*"
      - "/readyz*"
      - "/version"
      - "/swagger*"
      - "/openapi*"
      - "/metrics*"

  # Drop high-volume Event resource
  - level: None
    resources:
      - group: ""
        resources: ["events"]

  # Drop kube-system internal control loops (high volume, low value)
  - level: None
    users: ["system:kube-controller-manager", "system:kube-scheduler", "system:serviceaccount:kube-system:endpoint-controller"]
    verbs: ["get", "list", "watch", "update"]
    namespaces: ["kube-system"]

  - level: None
    userGroups: ["system:nodes"]
    verbs: ["get", "list", "watch"]

  # Secrets / ConfigMaps / Token reviews: log metadata only (do NOT log body)
  - level: Metadata
    resources:
      - group: ""
        resources: ["secrets", "configmaps", "serviceaccounts/token"]
      - group: "authentication.k8s.io"
        resources: ["tokenreviews"]

  # Mutating verbs on anything else: full request + response
  - level: RequestResponse
    verbs: ["create", "update", "patch", "delete", "deletecollection"]

  # Catch-all: metadata for reads
  - level: Metadata

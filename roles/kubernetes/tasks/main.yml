---
- name: Ensure offline binaries directory exists
  file:
    path: /tmp/k8s-bin
    state: directory
  when: airgap.enabled | bool

- name: Copy Kubernetes installer binaries bundle
  copy:
    src: "{{ airgap.artifacts_dir }}/bin/"
    dest: /tmp/k8s-bin/
  when: airgap.enabled | bool

- name: Check for kubeadm binary
  stat:
    path: /tmp/k8s-bin/kubeadm
  register: kubeadm_binary
  when: airgap.enabled | bool

- name: Check for kubelet binary
  stat:
    path: /tmp/k8s-bin/kubelet
  register: kubelet_binary
  when: airgap.enabled | bool

- name: Check for kubectl binary
  stat:
    path: /tmp/k8s-bin/kubectl
  register: kubectl_binary
  when: airgap.enabled | bool

- name: Install kubeadm from local binary bundle
  copy:
    src: /tmp/k8s-bin/kubeadm
    dest: /usr/local/bin/kubeadm
    remote_src: true
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubeadm_binary.stat.exists | default(false)

- name: Install kubelet from local binary bundle
  copy:
    src: /tmp/k8s-bin/kubelet
    dest: /usr/local/bin/kubelet
    remote_src: true
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubelet_binary.stat.exists | default(false)

- name: Install kubectl from local binary bundle
  copy:
    src: /tmp/k8s-bin/kubectl
    dest: /usr/local/bin/kubectl
    remote_src: true
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubectl_binary.stat.exists | default(false)

- name: Install Kubernetes components from offline packages
  shell: yum localinstall -y /tmp/k8s-packages/kubeadm*.rpm /tmp/k8s-packages/kubelet*.rpm /tmp/k8s-packages/kubectl*.rpm /tmp/k8s-packages/kubernetes-cni*.rpm
  when:
    - airgap.enabled | bool
    - ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Kubernetes DEB packages offline on Debian/Ubuntu
  shell: DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/k8s-packages/kubeadm*.deb /tmp/k8s-packages/kubelet*.deb /tmp/k8s-packages/kubectl*.deb /tmp/k8s-packages/kubernetes-cni*.deb
  when:
    - airgap.enabled | bool
    - ansible_os_family == "Debian"
  ignore_errors: yes

- name: Ensure kubelet pod logs directory exists when customized
  file:
    path: "{{ kubelet.pod_logs_dir }}"
    state: directory
    mode: '0755'
  when: kubelet.pod_logs_dir | default('') | length > 0

- name: Enable and start kubelet
  systemd:
    name: kubelet
    state: started
    enabled: yes

- include_tasks: master_init.yml
  when: inventory_hostname == groups['masters'][0]

- include_tasks: master_join.yml
  when: 
    - node_role == 'master'
    - inventory_hostname != groups['masters'][0]

- include_tasks: worker_join.yml
  when: node_role == 'worker'

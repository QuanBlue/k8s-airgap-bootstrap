---
- name: Resolve kubeadm binary on control node
  set_fact:
    kubeadm_binary_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/kubeadm', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Resolve kubelet binary on control node
  set_fact:
    kubelet_binary_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/kubelet', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Resolve kubectl binary on control node
  set_fact:
    kubectl_binary_src: "{{ lookup('ansible.builtin.fileglob', airgap.artifacts_dir ~ '/bin/kubectl', wantlist=True) | first | default('') }}"
  when: airgap.enabled | bool

- name: Install kubeadm from local binary bundle
  copy:
    src: "{{ kubeadm_binary_src }}"
    dest: /usr/local/bin/kubeadm
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubeadm_binary_src | length > 0

- name: Install kubelet from local binary bundle
  copy:
    src: "{{ kubelet_binary_src }}"
    dest: /usr/local/bin/kubelet
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubelet_binary_src | length > 0

- name: Install kubectl from local binary bundle
  copy:
    src: "{{ kubectl_binary_src }}"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubectl_binary_src | length > 0

- name: Install kubernetes-cni DEB package for CNI plugins
  shell: DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/k8s-packages/kubernetes-cni*.deb
  when: airgap.enabled | bool
  register: cni_install
  failed_when:
    - cni_install.rc != 0
    - "'already installed' not in cni_install.stderr"
    - "'is already installed' not in cni_install.stdout"

- name: Install kubelet systemd service from DEB package
  shell: DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/k8s-packages/kubelet*.deb
  when: airgap.enabled | bool
  register: kubelet_deb_install
  failed_when:
    - kubelet_deb_install.rc != 0
    - "'already installed' not in kubelet_deb_install.stderr"
    - "'is already installed' not in kubelet_deb_install.stdout"

- name: Override kubelet binary with airgap version
  copy:
    src: "{{ kubelet_binary_src }}"
    dest: /usr/bin/kubelet
    mode: '0755'
  when:
    - airgap.enabled | bool
    - kubelet_binary_src | length > 0

- name: Ensure kubelet pod logs directory exists when customized
  file:
    path: "{{ kubelet.pod_logs_dir }}"
    state: directory
    mode: '0755'
  when: kubelet.pod_logs_dir | default('') | length > 0

- name: Ensure kubelet systemd drop-in directory exists
  file:
    path: /etc/systemd/system/kubelet.service.d
    state: directory
    mode: '0755'

# kubeadm DEB normally ships this drop-in, but we install kubeadm as a raw
# binary from the airgap bundle. Without it, kubelet starts with no args and
# never picks up its config / kubeconfig / CRI socket → no static pods spawn.
- name: Install kubeadm systemd drop-in for kubelet
  copy:
    dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
    mode: '0644'
    content: |
      # Note: This dropin only works with kubeadm and kubelet v1.11+
      [Service]
      Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
      Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
      EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
      EnvironmentFile=-/etc/default/kubelet
      ExecStart=
      ExecStart=/usr/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS
  register: kubelet_dropin

- name: Reload systemd when kubelet drop-in changed
  systemd:
    daemon_reload: true
  when: kubelet_dropin.changed

- name: Enable and start kubelet
  systemd:
    name: kubelet
    state: started
    enabled: yes

- include_tasks: master_init.yml
  when: inventory_hostname == groups['masters'][0]

- include_tasks: master_join.yml
  when:
    - inventory_hostname in groups['masters']
    - inventory_hostname != groups['masters'][0]

- include_tasks: worker_join.yml
  when: inventory_hostname in groups['workers']

---
- name: Load join commands
  include_vars:
    file: /tmp/k8s_join_commands.yml
    name: join_vars
  delegate_to: localhost

- name: Check if node is already joined
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Join master node to cluster
  command: "{{ join_vars.master_join }}"
  when: not kubeadm_admin_conf.stat.exists

- name: Setup kubeconfig for root
  file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Copy admin.conf to root's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    mode: '0600'

- name: Render local-only kubeconfig that bypasses the VIP
  shell: |
    sed 's|server: https://.*|server: https://{{ hostvars[inventory_hostname]['ansible_host'] }}:6443|' \
      /etc/kubernetes/admin.conf > /etc/kubernetes/admin-local.conf
    chmod 0600 /etc/kubernetes/admin-local.conf
  changed_when: false

- name: Wait for local apiserver to be healthy
  command: kubectl --kubeconfig=/etc/kubernetes/admin-local.conf --request-timeout=5s get --raw=/livez
  register: apiserver_local
  until: apiserver_local.rc == 0
  retries: 30
  delay: 2
  changed_when: false

- name: Label master node with control-plane and master roles
  command: kubectl --kubeconfig /etc/kubernetes/admin-local.conf label node {{ inventory_hostname | lower }} node-role.kubernetes.io/control-plane= node-role.kubernetes.io/master= --overwrite

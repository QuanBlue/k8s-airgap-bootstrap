---
- name: Stage offline DEB packages into apt cache
  shell: cp /tmp/k8s-packages/*.deb /var/cache/apt/archives/ 2>/dev/null || true
  when: airgap.enabled | bool
  changed_when: false

- name: Install keepalived and HA dependencies via apt (resolves from local cache)
  apt:
    name:
      - keepalived
      - socat
      - conntrack
      - ipset
      - ipvsadm
    state: present
    update_cache: no
  when: airgap.enabled | bool
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Ensure keepalived config directory exists
  file:
    path: /etc/keepalived
    state: directory
    mode: '0755'

- name: Create keepalived health check script
  copy:
    dest: "{{ keepalived_check_script_path }}"
    content: |
      #!/bin/bash
      errorExit() {
          echo "*** $*" 1>&2
          exit 1
      }
      check_port() {
          local host="$1" port="$2"
          timeout 2 bash -c "exec 3<>/dev/tcp/${host}/${port}" >/dev/null 2>&1 || errorExit "TCP check failed for ${host}:${port}"
      }
      for port in {% for port in keepalived_check_ports %}{{ port }} {% endfor %}; do
          check_port "127.0.0.1" "$port"
      done
      if ip addr | grep -q "{{ keepalived_vip_address }}"; then
          for port in {% for port in keepalived_check_ports %}{{ port }} {% endfor %}; do
              check_port "{{ keepalived_vip_address }}" "$port"
          done
      fi
    mode: '0755'

- name: Configure Keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: restart keepalived

- name: Enable and start Keepalived
  systemd:
    name: keepalived
    state: started
    enabled: yes
